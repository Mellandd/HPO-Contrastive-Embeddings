base_params:
  model_name: NeuML/pubmedbert-base-embeddings
  train_path: data/phase2/splits_struct_rbp/train.parquet
  val_path: data/phase2/splits_struct_rbp/val.parquet
  test_path: data/phase2/splits_struct_rbp/test.parquet
  output_dir: models/phase3/hpo_runs
  epochs: 4
  batch_size: 64
  eval_batch_size: 256
  freeze_layers: 6
  min_lr: 1.0e-06
  max_lr: 5.0e-05
  weight_decay: 0.01
  warmup_ratio: 0.1
  max_grad_norm: 1.0
  max_seq_length: 256
  seed: 13
  use_amp: true
  train_eval_sample: 2000
  loss_type: cosent
  skip_test: true
  use_lora: false
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  lora_target_modules: ["query", "value"]

search_space:
  freeze_layers:
    choices: [4, 6, 8, 10]
  max_lr:
    low: 2.0e-05
    high: 1.0e-04
    log: true
  batch_size:
    choices: [32, 64]
  max_seq_length:
    choices: [128, 192, 256]
  warmup_ratio:
    low: 0.05
    high: 0.2
  weight_decay:
    choices: [0.0, 0.01, 0.05]
  loss_type:
    choices: [cosent, cosine, angle]
  use_lora:
    choices: [false, true]
  lora_r:
    choices: [8, 16, 32, 64]
  lora_alpha:
    choices: [16, 32, 48, 64]
  lora_dropout:
    choices: [0.0, 0.05, 0.1, 0.2]

objective_metric: best_val_spearman
